name: E2E & API Tests

# Runs against the live storefront, so we don't run on every push/PR.
# Trigger manually from the Actions tab, or let the nightly schedule pick it up.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC nightly

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Run tests
        run: pnpm test
        env:
          # Absent secrets simply mean the auth setup skips and only guest journeys run.
          E2E_ACCOUNT_EMAIL: ${{ secrets.E2E_ACCOUNT_EMAIL }}
          E2E_ACCOUNT_PASSWORD: ${{ secrets.E2E_ACCOUNT_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
