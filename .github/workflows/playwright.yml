name: E2E & API Tests

# Full Playwright suite (setup + e2e-chromium + api) against the live Salesforce demo store.
on:
  pull_request:
    branches: [main] # during a PR into main
  push:
    branches: [main] # after a PR merge, or a direct push to main
  schedule:
    # Nightly 05:00 Pacific. GitHub honours the IANA timezone (GA March 2026) and
    # handles daylight saving, so it stays 5 AM local across PST and PDT.
    - cron: '0 5 * * *'
      timezone: 'America/Los_Angeles'
  workflow_dispatch: # manual run from the Actions tab

# Least privilege: the job only needs to read the repo to check it out.
permissions:
  contents: read

# A new push supersedes an in-flight PR run; post-merge, nightly, and manual runs always finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Playwright (setup + e2e-chromium + api)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # The official Playwright image ships the browsers and Node, so there is no
    # browser-install step. Pin the tag to the @playwright/test version in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --user 1001
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6 # pnpm version is read from package.json "packageManager"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        env:
          # Absent account secrets skip auth setup and run guest-only journeys;
          # all SFCC_* config falls back to public demo defaults, so no secrets are required.
          E2E_ACCOUNT_EMAIL: ${{ secrets.E2E_ACCOUNT_EMAIL }}
          E2E_ACCOUNT_PASSWORD: ${{ secrets.E2E_ACCOUNT_PASSWORD }}
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
